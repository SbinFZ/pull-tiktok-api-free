# Cloudflare Worker — TikTok playback-info puller
# Deploy:  npx wrangler deploy
# Dev:     npx wrangler dev
name = "pull-tiktok-api-free"
main = "src/index.js"
compatibility_date = "2026-06-01"
account_id = "7ba0873771176b0b2dc1f3aadf031abc"
workers_dev = true
preview_urls = false

[vars]
TIKTOK_DATA_SOURCE = "apify"

# Static frontend (public/) is served by the platform's Assets runtime.
# Any path NOT matching a static file falls through to the Worker (src/index.js),
# which handles the /api/* proxy routes.
[assets]
directory = "./public"
binding = "ASSETS"

[observability]
enabled = true
